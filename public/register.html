<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaGrow — Inscription</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:#07080C;color:#DDE1EE;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:440px;}
.logo{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:36px;}
.logo-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#4F6EF7,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.logo-sub{font-size:10px;color:#5A6280;letter-spacing:1.5px;text-transform:uppercase;}
.card{background:#0E1018;border:1px solid #1C2032;border-radius:18px;padding:32px;}
.title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px;}
.subtitle{font-size:13px;color:#5A6280;margin-bottom:24px;}
.lbl{display:block;font-size:11px;font-weight:600;color:#5A6280;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:6px;}
input{width:100%;background:#141720;border:1px solid #1C2032;border-radius:10px;padding:11px 14px;color:#DDE1EE;font-size:13.5px;font-family:'Instrument Sans',sans-serif;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
input:focus{border-color:#4F6EF7;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:'Instrument Sans',sans-serif;background:#4F6EF7;color:#fff;transition:opacity 0.15s;}
.btn:hover{opacity:0.88;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.err{background:#F0464A15;border:1px solid #F0464A33;border-radius:10px;padding:10px 14px;font-size:12.5px;color:#F0464A;margin-bottom:14px;display:none;}
.login-link{text-align:center;margin-top:18px;font-size:13px;color:#5A6280;}
.login-link a{color:#4F6EF7;text-decoration:none;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">NexaGrow</div>
      <div class="logo-sub">AI Marketing Suite</div>
    </div>
  </div>
  <div class="card">
    <div class="title">Créer un compte</div>
    <div class="subtitle">Commencez à automatiser votre marketing avec l'IA</div>
    <div class="err" id="err"></div>
    <div class="row">
      <div><label class="lbl">Prénom & Nom</label><input id="name" placeholder="Youssef Benali"/></div>
      <div><label class="lbl">Entreprise</label><input id="company" placeholder="Boutique Benali"/></div>
    </div>
    <label class="lbl">Email</label>
    <input id="email" type="email" placeholder="vous@entreprise.ma"/>
    <label class="lbl">Mot de passe</label>
    <input id="pass" type="password" placeholder="Minimum 6 caractères" onkeydown="if(event.key==='Enter')register()"/>
    <button class="btn" id="btn" onclick="register()">Créer mon compte →</button>
    <div class="login-link">Déjà un compte ? <a href="/login">Se connecter</a></div>
  </div>
</div>
<script>
async function register(){
  const name=document.getElementById('name').value.trim();
  const company=document.getElementById('company').value.trim();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  err.style.display='none';
  if(!name||!email||!pass){err.textContent='Remplissez tous les champs obligatoires.';err.style.display='block';return;}
  if(pass.length<6){err.textContent='Mot de passe minimum 6 caractères.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Création…';
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({name,company,email,password:pass})});
    const d=await r.json();
    if(!r.ok){err.textContent=d.error||'Erreur.';err.style.display='block';}
    else window.location.href='/app';
  }catch(e){err.textContent='Erreur réseau.';err.style.display='block';}
  btn.disabled=false;btn.textContent='Créer mon compte →';
}
</script>
</body>
</html>
